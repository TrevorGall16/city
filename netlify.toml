[build]
  command = "npm run build"

[build.environment]
  NETLIFY_SKIP_BLOBS_UPLOAD = "true"
  NODE_VERSION = "22.13.0"
  NODE_OPTIONS = "--max-old-space-size=4096"
  NEXT_CPU_LIMIT = "1"

# Native Next.js runtime — required for SSR routes, middleware,
# and the Supabase-backed /api/* handlers.
[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
